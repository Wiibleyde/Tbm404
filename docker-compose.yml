services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: tbm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-tbm}
      POSTGRES_DB: tbm404
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tbm -d tbm404"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile.app
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://tbm:${POSTGRES_PASSWORD:-tbm}@postgres:5432/tbm404
      NODE_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy

  collector:
    build:
      context: .
      dockerfile: Dockerfile.collector
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://tbm:${POSTGRES_PASSWORD:-tbm}@postgres:5432/tbm404
      SIRI_URL: https://bdx.mecatran.com/utw/ws/siri/2.0/bordeaux/general-message.json?AccountKey=opendata-bordeaux-metropole-flux-gtfs-rt
      GTFS_URL: https://bdx.mecatran.com/utw/ws/gtfsfeed/static/bordeaux?apiKey=opendata-bordeaux-metropole-flux-gtfs-rt
      POLL_INTERVAL_SECONDS: "180"
      GTFS_REFRESH_HOURS: "24"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
